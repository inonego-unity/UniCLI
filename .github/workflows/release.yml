name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish cli/unicli.csproj -c Release -o cli/bin/publish

    - name: Zip
      run: Compress-Archive -Path cli/bin/publish/* -DestinationPath unicli-windows-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: unicli-windows-x64.zip
        generate_release_notes: true
