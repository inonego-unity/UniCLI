name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish cli/unicli.csproj -c Release -o cli/bin/publish

    - name: Clean debug symbols
      run: |
        Remove-Item cli/bin/publish/*.pdb -ErrorAction SilentlyContinue
        Remove-Item cli/bin/publish/*.xml -ErrorAction SilentlyContinue

    - name: Copy licenses and docs
      run: |
        Copy-Item LICENSE cli/bin/publish/
        Copy-Item THIRD-PARTY-NOTICES.md cli/bin/publish/

    - name: Zip
      run: Compress-Archive -Path cli/bin/publish/* -DestinationPath unicli-windows-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2.3.2
      with:
        files: unicli-windows-x64.zip
        generate_release_notes: true
        draft: false
